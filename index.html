<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <section class="hero min-width mb100"></section>

<main class="wrapper">

        <div class="left_column gap16">
            <div class="h300 w420 base-bg br-16"></div>
            <div class="h300 w420 base-bg br-16"></div>
            <div class="h300 w420 base-bg br-16"></div>

            <div class="pagination gap16">
                <div class="h24 w24 base-bg br-4"></div>
                <div class="h24 w24 base-bg br-4"></div>
                <div class="h24 w24 base-bg br-4"></div>
                <div class="h24 w24 base-bg br-4"></div>
                <div class="h24 w24 base-bg br-4"></div>
            </div>
        </div>
            <div class="right_column gap40">

                <div class="h140 w140 base-bg br-4"></div>
                <div class="h140 w140 base-bg br-4"></div>
            </div>

        <div class="flex gap16">
            <div class="h300 w600 base-bg br-4"></div>
            <div class="h300 w300 base-bg1 br-4"></div>
        </div>
        <div class="flex gap16">
            <div class="h300 w300 base-bg1 br-4"></div>
            <div class="h300 w600 base-bg br-4"></div>
        </div>
    </div>
</section>
    <section class="services mb50">
        <div class="flex justify-center gap180">
            <div class="h160 w160 base-bg br-50"></div>
            <div class="h160 w160 base-bg br-50"></div>
            <div class="h160 w160 base-bg br-50"></div>
        </div>

</main>
<footer class="footer h300 w100 min-width base-bg1">
    <div class="footer-content"></div>
</footer>
</body>
</html>
